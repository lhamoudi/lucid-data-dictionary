name: Generate Data Dictionary

on:
  workflow_dispatch:
    inputs:
      doc-id:
        description: 'Lucid document UUID, or "all" to process every doc in docs.json'
        required: true
        default: 'all'
      enrich:
        description: 'Use Claude API to generate descriptions and categories (requires ANTHROPIC_API_KEY secret)'
        required: false
        type: boolean
        default: false
      concurrency:
        description: 'With doc-id "all", number of documents to process at once'
        required: false
        type: string
        default: '4'
      exclude-baseline:
        description: 'Doc ID whose attributes should be excluded from other docs (in addition to any docs.json "baseline": true entries)'
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate dictionary
        env:
          LUCID_API_KEY: ${{ secrets.LUCID_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ENRICH_FLAG=""
          if [ "${{ inputs.enrich }}" = "true" ]; then
            ENRICH_FLAG="--enrich"
          fi
          BASELINE_FLAG=""
          if [ -n "${{ inputs.exclude-baseline }}" ]; then
            BASELINE_FLAG="--exclude-baseline ${{ inputs.exclude-baseline }}"
          fi
          if [ "${{ inputs.doc-id }}" = "all" ]; then
            node scripts/gen_data_dictionary.js --all --out-dir docs --concurrency "${{ inputs.concurrency }}" $ENRICH_FLAG $BASELINE_FLAG
          else
            node scripts/gen_data_dictionary.js "${{ inputs.doc-id }}" --out-dir docs $ENRICH_FLAG $BASELINE_FLAG
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-dictionary
          path: docs/
