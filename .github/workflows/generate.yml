name: Generate Data Dictionary

on:
  workflow_dispatch:
    inputs:
      doc-id:
        description: 'Lucid document UUID, or "all" to process every doc in docs.json'
        required: true
        default: 'all'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate dictionary
        env:
          LUCID_API_KEY: ${{ secrets.LUCID_API_KEY }}
        run: |
          if [ "${{ inputs.doc-id }}" = "all" ]; then
            node scripts/gen_data_dictionary.js --all --out-dir docs
          else
            node scripts/gen_data_dictionary.js "${{ inputs.doc-id }}" --out-dir docs
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-dictionary
          path: docs/
